<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ethics — DB 관리자 (고밀도 목업)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  :root{ --lg:11px; --md:9px; --sm:7px; --brand:#1a6b5c; --line:#e6eceb; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Noto Sans KR','Malgun Gothic',sans-serif; background:#eef2f1; color:#0f172a; font-size:var(--md); }

  /* ===== 상단 탭 바 ===== */
  .tabbar{ display:flex; align-items:center; justify-content:space-between; background:linear-gradient(160deg,#0e2620,#1a6b5c); color:#fff; padding:0 12px; height:42px; position:sticky; top:0; z-index:20; }
  .tabbar .brand{ font-size:var(--lg); font-weight:800; margin-right:14px; white-space:nowrap; }
  .tabs{ display:flex; gap:2px; flex:1; }
  .tabs .tab{ font-size:var(--lg); font-weight:700; color:#bfe6da; padding:7px 16px; border-radius:7px 7px 0 0; cursor:pointer; }
  .tabs .tab:hover{ background:rgba(255,255,255,.08); }
  .tabs .tab.on{ background:#f5f8f7; color:var(--brand); }
  .topbtns{ display:flex; gap:4px; }
  .topbtns button{ font-size:var(--md); font-weight:700; border:none; border-radius:6px; padding:6px 10px; cursor:pointer; background:rgba(255,255,255,.14); color:#fff; }
  .topbtns button:hover{ background:rgba(255,255,255,.26); }
  .topbtns button.add{ background:#4ade80; color:#063b2c; }
  .topbtns button.del{ background:#f87171; color:#3b0606; }

  /* ===== 본체 ===== */
  .shell{ display:grid; grid-template-columns:148px 1fr; min-height:calc(100vh - 42px); }
  /* 좌측 목차 */
  .side{ background:#0f2620; color:#cfeae0; padding:8px 0; }
  .side .gl{ font-size:var(--sm); color:#6fb39d; padding:8px 12px 4px; letter-spacing:.4px; }
  .side a{ display:block; font-size:var(--md); color:#d7efe7; padding:7px 12px; cursor:pointer; border-left:3px solid transparent; }
  .side a:hover{ background:rgba(255,255,255,.06); }
  .side a.on{ background:rgba(255,255,255,.12); border-left-color:#4ade80; color:#fff; font-weight:800; }

  /* 작업영역 */
  .work{ display:grid; grid-template-columns:1fr; min-width:0; }
  .work.open{ grid-template-columns: minmax(0,1fr) 388px; }
  .panel{ background:#fff; border-right:1px solid var(--line); min-width:0; }
  .phead{ display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid var(--line); position:sticky; top:42px; background:#fff; z-index:5; }
  .phead .pt{ font-size:var(--lg); font-weight:800; color:#0e2620; }
  .phead .pt .bd{ background:#f0fdf4; color:var(--brand); font-size:var(--sm); font-weight:700; padding:2px 7px; border-radius:20px; margin-left:6px; }
  .phead .ph-btns{ display:flex; gap:3px; }
  .phead .ph-btns button{ font-size:var(--sm); border:1px solid var(--line); background:#f8fafc; color:#475569; border-radius:5px; padding:4px 7px; cursor:pointer; font-weight:700; }
  .phead .ph-btns button:hover{ background:#eef2f1; }
  .phint{ font-size:var(--sm); color:#94a3b8; padding:4px 12px; }

  /* ===== 테이블 ===== */
  table{ width:100%; border-collapse:collapse; font-size:var(--md); }
  th{ background:#f3f7f6; color:#475569; font-weight:700; text-align:left; padding:5px 8px; font-size:var(--sm); border-bottom:1px solid var(--line); white-space:nowrap; position:sticky; top:74px; z-index:4; }
  td{ padding:4px 8px; border-bottom:1px solid #f1f5f9; color:#334155; vertical-align:middle; }
  tbody tr{ cursor:pointer; }
  tbody tr:nth-child(even){ background:#fafdfc; }
  tbody tr:hover{ background:#eefaf4; }
  tbody tr.sel{ background:#dcfce7 !important; box-shadow:inset 3px 0 0 var(--brand); }
  td.no,th.no{ text-align:center; color:#94a3b8; width:30px; }
  td.ck,th.ck{ width:26px; text-align:center; }
  /* 셀 세로 묶음 */
  .cs{ display:flex; flex-direction:column; gap:1px; line-height:1.25; }
  .cs .t{ font-weight:800; font-size:var(--md); color:#0f172a; }
  .cs .s{ font-size:var(--sm); color:#64748b; }
  /* 배지·등급 */
  .g{ display:inline-block; padding:1px 7px; border-radius:20px; font-size:var(--sm); font-weight:800; color:#fff; }
  .g.Ap{background:#059669} .g.A{background:#0891b2} .g.B{background:#7c3aed} .g.C{background:#d97706} .g.D{background:#dc2626}
  .b{ display:inline-block; font-size:var(--sm); padding:1px 6px; border-radius:5px; font-weight:700; }
  .b.gray{background:#f1f5f9;color:#475569} .b.grn{background:#dcfce7;color:#059669} .b.red{background:#fee2e2;color:#dc2626} .b.blu{background:#dbeafe;color:#2563eb} .b.pur{background:#ede9fe;color:#7c3aed} .b.org{background:#ffedd5;color:#d97706}
  .lvl.고급{background:#fee2e2;color:#dc2626} .lvl.핵심{background:#dbeafe;color:#2563eb} .lvl.기본{background:#dcfce7;color:#059669}
  /* 그리드 모드 (목록형) */
  .grid4{ display:grid; grid-template-columns:repeat(4,1fr); gap:5px; padding:8px; }
  .gcell{ border:1px solid var(--line); border-radius:7px; padding:6px 8px; cursor:pointer; background:#fafdfc; }
  .gcell:hover{ border-color:var(--brand); background:#f0fdf4; }
  .gcell.sel{ border-color:var(--brand); background:#dcfce7; }
  .gcell .gt{ font-size:var(--md); font-weight:800; color:#0f172a; }
  .gcell .gs{ font-size:var(--sm); color:#64748b; margin-top:1px; }
  .gcell .gn{ font-size:var(--sm); color:#94a3b8; }

  /* 대시보드 카드 */
  .cards{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:10px 12px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:9px; padding:10px 12px; }
  .card .cl{ font-size:var(--sm); color:#64748b; } .card .cn{ font-size:18px; font-weight:800; color:var(--brand); } .card .cu{ font-size:var(--sm); color:#94a3b8; }

  /* ===== 오른쪽 상세 패널 (가로줄 없음 · 4단) ===== */
  .detail{ background:#f8fbfa; display:none; flex-direction:column; height:calc(100vh - 42px); position:sticky; top:42px; overflow-y:auto; }
  .work.open .detail{ display:flex; }
  .dprof{ background:linear-gradient(160deg,#0e2620,#1a6b5c); color:#fff; padding:12px; }
  .dprof .dn{ font-size:15px; font-weight:800; } .dprof .dsub{ font-size:var(--md); color:#bfe6da; margin-top:3px; }
  .dtabs{ display:flex; gap:3px; padding:7px 10px; flex-wrap:wrap; border-bottom:1px solid var(--line); }
  .dtabs span{ font-size:var(--sm); font-weight:700; padding:3px 8px; border-radius:20px; background:#eef2f1; color:#475569; cursor:pointer; }
  .dtabs span.on{ background:var(--brand); color:#fff; }
  .dgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:7px 10px; padding:12px; }
  .dgrid .f{ display:flex; flex-direction:column; gap:1px; }
  .dgrid .f.wide{ grid-column:span 2; } .dgrid .f.full{ grid-column:span 4; }
  .dgrid .f .l{ font-size:var(--sm); color:#94a3b8; font-weight:700; }
  .dgrid .f .v{ font-size:var(--md); color:#0f172a; font-weight:600; word-break:break-all; }
  .dsum{ padding:0 12px 10px; }
  .dsum .sc{ background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-bottom:6px; }
  .dsum .sc .sct{ font-size:var(--sm); color:var(--brand); font-weight:800; margin-bottom:3px; }
  .dsum .sc .scv{ font-size:var(--md); color:#475569; }
  .dbtns{ display:flex; flex-wrap:wrap; gap:4px; padding:10px 12px; border-top:1px solid var(--line); position:sticky; bottom:0; background:#f8fbfa; }
  .dbtns button{ font-size:var(--sm); font-weight:700; border:1px solid var(--line); background:#fff; color:#334155; border-radius:6px; padding:5px 9px; cursor:pointer; }
  .dbtns button:hover{ background:#eef2f1; }
  .dbtns button.pri{ background:var(--brand); color:#fff; border-color:var(--brand); }
  .dbtns button.dng{ background:#fee2e2; color:#dc2626; border-color:#fecaca; }
</style>
</head>
<body>

<!-- ===== 상단 탭 바 (왼쪽 탭 / 오른쪽 끝 버튼) ===== -->
<div class="tabbar">
  <div style="display:flex;align-items:center;flex:1;min-width:0">
    <div class="brand">⚖️ AI Ethics DB</div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="topbtns">
    <button class="add" onclick="act('추가')">➕ 추가</button>
    <button onclick="act('수정')">✏️ 수정</button>
    <button class="del" onclick="act('삭제')">🗑️ 삭제</button>
    <button onclick="act('더보기')">⋯ 더보기</button>
    <button onclick="doLogout()" title="로그아웃">🔓</button>
  </div>
</div>

<!-- 관리자 로그인 오버레이 -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;background:rgba(10,30,25,.93);z-index:100;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;width:300px;">
    <div style="font-weight:800;font-size:15px;color:#0e2620;">🔐 관리자 로그인</div>
    <div style="color:#64748b;font-size:11px;margin:4px 0 10px;">Supabase에 등록된 관리자 계정으로 로그인</div>
    <div style="background:#f0fdf4;border:1px dashed #1a6b5c;border-radius:7px;padding:8px 10px;margin-bottom:12px;font-size:11px;color:#065f46;line-height:1.6;">
      🧪 <b>임시 테스트 계정</b> (그대로 두고 로그인 누르세요)<br>
      아이디: <b>admin@naver.com</b><br>
      비밀번호: <b>admin1234</b>
    </div>
    <input id="loginEmail" type="email" placeholder="이메일" value="admin@naver.com" style="width:100%;padding:9px;border:1px solid #e2e8f0;border-radius:7px;margin-bottom:8px;font-size:12px;">
    <input id="loginPw" type="password" placeholder="비밀번호" value="admin1234" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:9px;border:1px solid #e2e8f0;border-radius:7px;margin-bottom:12px;font-size:12px;">
    <button onclick="doLogin()" style="width:100%;padding:10px;background:#1a6b5c;color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;font-size:13px;">로그인</button>
    <div id="loginMsg" style="color:#dc2626;font-size:11px;margin-top:8px;min-height:14px;"></div>
  </div>
</div>

<div class="shell">
  <!-- 좌측 목차 -->
  <nav class="side" id="side"></nav>

  <!-- 작업영역 -->
  <div class="work" id="work">
    <div class="panel">
      <div class="phead">
        <div class="pt" id="ptitle">대시보드</div>
        <div class="ph-btns">
          <button onclick="act('펼치기')">▾ 펼치기</button>
          <button onclick="act('추가')">＋추가</button>
          <button onclick="act('내보내기')">⬇ 내보내기</button>
        </div>
      </div>
      <div class="phint" id="phint"></div>
      <div id="content"></div>
    </div>

    <!-- 오른쪽 상세 패널 -->
    <aside class="detail" id="detail">
      <div class="dprof"><div class="dn" id="dName">—</div><div class="dsub" id="dSub"></div></div>
      <div class="dtabs"><span class="on">기본정보</span><span>상담/매칭</span><span>결제/수수료</span><span>활동/이력</span><span>메모</span></div>
      <div class="dgrid" id="dGrid"></div>
      <div class="dsum" id="dSum"></div>
      <div class="dbtns">
        <button class="pri">💾 저장</button><button>✉ 이메일</button><button>📨 SMS</button>
        <button>🔁 상태변경</button><button>💬 메모</button><button class="dng">🗑 삭제</button>
        <button onclick="closeDetail()">✖ 닫기</button>
      </div>
    </aside>
  </div>
</div>

<script>
/* ============ 메뉴 구성 ============ */
const TABS=[
  {id:'status',name:'현황',items:['dash']},
  {id:'ops',name:'진단운영',items:['sessions','answers','scores','sfields']},
  {id:'cust',name:'고객·매출',items:['users','leads','pays']},
  {id:'base',name:'기초자료',items:['types','axes','questions','labels','targets','fields','courses','payf','grades']},
];
const META={dash:'📊 대시보드',sessions:'📝 진단 기록부',answers:'✏️ 답변 기록',scores:'📈 항목별 점수',sfields:'🎯 분야 선택 메모',
  users:'👤 회원 명단',leads:'📞 상담 신청부',pays:'💰 결제 내역부',
  types:'🗂️ 진단 종류표',axes:'⚖️ 평가 항목표',questions:'❓ 질문 모음',labels:'🔘 답변 보기표',
  targets:'🙋 역할 목록',fields:'📚 관심 분야표',courses:'🃏 적용분야 카드',payf:'🎁 유료진단 혜택',grades:'🏅 등급 기준표'};
const HINT={dash:'한눈에 보는 요약. 행을 클릭하면 오른쪽에 상세가 열립니다.',
  sessions:'진단 1회 = 1줄. 반복값은 이모지로 축약 (🆓무료/💰유료).',
  answers:'진단 #2 이O준 의 문항별 답변.',scores:'진단 #2 항목별 점수 (강점🟢/취약🔴).',
  sfields:'진단할 때 고른 관심 분야.',users:'가입 회원. ☑로 여러 명 골라 위 버튼으로 일괄 처리.',
  leads:'유료 진단 신청자 연락처.',pays:'결제 기록 (✅완료/⚠️미납).',
  types:'판매 진단 6종 — 기본 자료.',axes:'점수 항목 24개 — 4단 그리드.',
  questions:'질문 82문항 전체 (진단 6종 색상 구분) — 기본 자료.',labels:'5단계 선택지 — 기본 자료.',
  targets:'대상·역할 10종 — 4단 그리드.',fields:'진단 분야 8종 — 4단 그리드.',
  courses:'홈 메인 소개 카드 24개 (진짜 강좌 아님).',payf:'유료별 제공 혜택.',grades:'점수→등급 기준 5단계.'};

/* ============ 셀/배지 헬퍼 ============ */
const cs=(t,s)=>`<div class="cs"><span class="t">${t}</span>${s?`<span class="s">${s}</span>`:''}</div>`;
const gb=g=>`<span class="g ${g==='A+'?'Ap':g}">${g}</span>`;

/* ============ 렌더링 ============ */
let curTab=TABS[0], curSec='dash';

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<div class="tab ${t.id===curTab.id?'on':''}" onclick="selTab('${t.id}')">${t.name}</div>`).join('');
}
function selTab(id){ curTab=TABS.find(t=>t.id===id); renderTabs(); renderSide(); selSec(curTab.items[0]); }
function renderSide(){
  document.getElementById('side').innerHTML=`<div class="gl">${curTab.name}</div>`+
    curTab.items.map(s=>`<a class="${s===curSec?'on':''}" onclick="selSec('${s}')">${META[s]}</a>`).join('');
}
function selSec(s){ curSec=s; closeDetail(); renderSide();
  document.getElementById('ptitle').textContent=META[s];
  document.getElementById('phint').textContent=HINT[s]||'';
  renderContent(s);
}

function renderContent(s){
  const d=DATA[s], box=document.getElementById('content');
  if(d.kind==='dash'){ box.innerHTML=dashHTML(); return; }
  if(d.kind==='grid'){
    box.innerHTML=`<div class="grid4">`+d.items.map((it,i)=>
      `<div class="gcell" onclick="openDetail(this,${JSON.stringify(it.detail).replace(/"/g,'&quot;')},'${(it.t||'').replace(/'/g,'')}')">
        <div class="gn">${i+1}</div><div class="gt">${it.t}</div>${it.s?`<div class="gs">${it.s}</div>`:''}</div>`).join('')+`</div>`;
    return;
  }
  // table
  const head=`<tr><th class="ck"><input type="checkbox" onclick="allck(this)"></th><th class="no">No</th>`+d.cols.map(c=>`<th>${c}</th>`).join('')+`</tr>`;
  const body=d.rows.map((r,i)=>{
    const det=r[r.length-1], cells=r.slice(0,-1);
    const tds=cells.map(c=>{
      if(c.includes('|')){ let [t,sub]=c.split('|'); if(/^(A\+|A|B|C|D)$/.test(sub.trim())) sub=gb(sub.trim()); return `<td>${cs(t,sub)}</td>`; }
      return `<td>${c}</td>`;
    }).join('');
    return `<tr onclick="openDetail(this,${JSON.stringify(det).replace(/"/g,'&quot;')},'${(cells[0]||'').split('|')[0].replace(/<[^>]+>/g,'').replace(/'/g,'')}')">
      <td class="ck" onclick="event.stopPropagation()"><input type="checkbox"></td><td class="no">${i+1}</td>${tds}</tr>`;
  }).join('');
  box.innerHTML=`<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function dashHTML(){
  const cards=[['오늘 진단','128','어제 +12'],['누적 회원','1,452','이달 +210'],['이번 달 매출','32만','유료 결제'],['평균 점수','78','전체 평균']];
  const rows=DATA.sessions.rows;
  const tb=rows.map((r,i)=>{const det=r[r.length-1];const c=r.slice(0,-1);
    return `<tr onclick='openDetail(this,${JSON.stringify(det)},"${c[0].split("|")[0]}")'>
     <td class="no">${i+1}</td><td>${cs(...c[0].split('|'))}</td><td>${cs(...c[2].split('|'))}</td><td>${c[3]}</td><td>${cs(c[4].split('|')[0], gb(c[4].split('|')[1]))}</td><td>${c[5]}</td></tr>`;}).join('');
  return `<div class="cards">`+cards.map(c=>`<div class="card"><div class="cl">${c[0]}</div><div class="cn">${c[1]}</div><div class="cu">${c[2]}</div></div>`).join('')+`</div>`+
    `<table><thead><tr><th class="no">No</th><th>이름</th><th>진단</th><th>대상</th><th>결과</th><th>날짜</th></tr></thead><tbody>${tb}</tbody></table>`;
}

/* ============ 상세 패널 ============ */
function openDetail(el,det,name){
  document.querySelectorAll('tbody tr.sel,.gcell.sel').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('work').classList.add('open');
  document.getElementById('dName').textContent=name||'상세';
  const g=(det&&det.grid)||[];
  document.getElementById('dSub').textContent=g.slice(0,2).map(x=>x[1]).join(' · ');
  document.getElementById('dGrid').innerHTML=g.map((f,i)=>{
    const wide=f[1]&&f[1].length>14; const full=f[1]&&f[1].length>34;
    return `<div class="f ${full?'full':wide?'wide':''}"><span class="l">${f[0]}</span><span class="v">${f[1]}</span></div>`;
  }).join('');
  const sum=(det&&det.sum)||[];
  document.getElementById('dSum').innerHTML=sum.map(s=>`<div class="sc"><div class="sct">${s[0]}</div><div class="scv">${s[1]}</div></div>`).join('');
}
function closeDetail(){ document.getElementById('work').classList.remove('open'); document.querySelectorAll('tbody tr.sel,.gcell.sel').forEach(x=>x.classList.remove('sel')); }
function allck(h){ document.querySelectorAll('#content tbody input[type=checkbox]').forEach(c=>c.checked=h.checked); }
function act(name){
  const n=document.querySelectorAll('#content tbody input:checked').length;
  alert(`[${name}] (목업) — 선택된 항목 ${n}개`);
}

/* ============ Supabase 실데이터 연결 ============ */
// 키는 config.js 에서 불러옵니다 (config.js 는 깃허브에 올라가지 않음)
const SB_URL=window.SB_URL||'';
const SB_KEY=window.SB_KEY||'';
const sb=(window.supabase && SB_URL && SB_URL.indexOf('YOUR')===-1)?window.supabase.createClient(SB_URL,SB_KEY):null;
const fmt=d=> d? String(d).slice(5,16).replace('T',' '):'';
const PM={card:'💳 카드',kakao:'💛 카카오',naver:'💚 네이버'};

function axisSum(ax){ if(!ax||!ax.length) return []; const s=[...ax].sort((a,b)=>b.score-a.score);
  return [['강점 TOP',s.slice(0,3).map(x=>x.axis+' '+x.score).join(', ')],['취약 TOP',s.slice(-3).map(x=>x.axis+' '+x.score).join(', ')]]; }
function mapSession(r){ return [
  `${r.name||'-'}|${r.target||''}`, `✉ ${r.email||'-'}|📞 ${r.phone||'-'}`,
  `${r.diag_label||r.diag_type||'-'}|${r.is_paid?'💰 유료':'🆓 무료'}`, r.target||'-',
  `${r.total_score==null?'-':r.total_score}점|${r.grade||'-'}`, fmt(r.created_at),
  {grid:[['이메일',r.email||'-'],['휴대폰',r.phone||'-'],['진단',r.diag_label||r.diag_type||'-'],['대상',r.target||'-'],['점수',(r.total_score==null?'-':r.total_score)+'점'],['등급',r.grade||'-'],['추천',r.reco_course||'-'],['응시일',fmt(r.created_at)],['선택분야',(r.fields||[]).join(', ')||'-']],sum:axisSum(r.axis_scores)} ]; }
function mapLead(r){ return [ `${r.name||'-'}`, `✉ ${r.email||'-'}|📞 ${r.phone||'-'}`, `${r.diag_type||'-'}`, fmt(r.created_at),
  {grid:[['이메일',r.email||'-'],['휴대폰',r.phone||'-'],['관심 진단',r.diag_type||'-'],['신청일',fmt(r.created_at)]]} ]; }
function mapPay(r){ const st=r.status==='완료'?'✅ 완료':r.status==='취소'?'⚠️ 취소':(r.status||'-'); const m=PM[r.pay_method]||r.pay_method||'-';
  return [ `${r.name||'-'}`, `${r.diag_type||'-'}`, `${r.amount||'-'}`, `${m}|${st}`, fmt(r.created_at),
  {grid:[['이름',r.name||'-'],['진단',r.diag_type||'-'],['금액',r.amount||'-'],['수단',m],['상태',st],['결제일',fmt(r.created_at)]]} ]; }

async function loadDB(){
  if(!sb){ console.warn('[Supabase 미설정] 샘플 데이터를 표시 중입니다. SB_URL/SB_KEY를 입력하세요.'); return; }
  try{
    const [dg,ld,pm]=await Promise.all([
      sb.from('diagnoses').select('*').order('created_at',{ascending:false}).limit(300),
      sb.from('leads').select('*').order('created_at',{ascending:false}).limit(300),
      sb.from('payments').select('*').order('created_at',{ascending:false}).limit(300),
    ]);
    if(dg.error||ld.error||pm.error){ console.error('[Supabase 조회오류]',dg.error||ld.error||pm.error); }
    if(dg.data){ DATA.sessions.rows=dg.data.map(mapSession); DATA.sessions.badge='총 '+dg.data.length+'건'; }
    if(ld.data){ DATA.leads.rows=ld.data.map(mapLead); DATA.leads.badge='총 '+ld.data.length+'건'; }
    if(pm.data){ DATA.pays.rows=pm.data.map(mapPay); DATA.pays.badge='총 '+pm.data.length+'건'; }
    selSec(curSec); // 현재 화면 새로고침
    console.log('[Supabase] 실데이터 로드 완료');
  }catch(e){ console.error('[Supabase]',e); }
}

/* ============ 관리자 로그인 (조회는 로그인 필요) ============ */
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  const m=document.getElementById('loginMsg'); m.textContent='로그인 중...';
  const { error }=await sb.auth.signInWithPassword({email,password:pw});
  if(error){ m.textContent='로그인 실패: '+error.message; return; }
  document.getElementById('loginOverlay').style.display='none';
  loadDB();
}
async function doLogout(){ if(sb){ await sb.auth.signOut(); } location.reload(); }
async function bootstrap(){
  if(!sb){ console.warn('[Supabase 미설정] 샘플 데이터를 표시합니다 (config.js 확인).'); return; }
  // 들어올 때마다 항상 로그인 (이전 세션이 있어도 로그아웃 후 로그인창 표시)
  try{ await sb.auth.signOut(); }catch(e){}
  document.getElementById('loginOverlay').style.display='flex';
}
bootstrap();
</script>
